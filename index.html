<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BetTracker">
<title>BetTracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#faf9f6;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;--ink-faint:#999;--border:#e8e4de;
    --green:#1a6b3c;--green-light:#edf7f1;--red:#b8291a;--red-light:#fdf0ee;
    --nula:#5a5a5a;--nula-light:#f0efed;--tennis:#c8860a;--tennis-light:#fef8ed;
    --football:#1a4a8c;--football-light:#edf2fb;--accent:#c8860a;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:calc(64px + var(--safe-bottom));}

  header{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .desktop-nav{display:flex;gap:4px;}
  .desktop-nav button{background:none;border:none;padding:8px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;transition:all 0.15s;}
  .desktop-nav button:hover{background:var(--cream);color:var(--ink);}
  .desktop-nav button.active{background:var(--ink);color:white;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .bank-badge{font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--cream);border:1px solid var(--border);padding:5px 12px;border-radius:20px;white-space:nowrap;}
  .bank-badge span{color:var(--ink);}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background 0.3s;flex-shrink:0;}
  .sync-dot.syncing{background:var(--tennis);animation:pulse 1s infinite;}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-bottom));z-index:200;justify-content:space-around;}
  .bottom-nav button{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--ink-faint);cursor:pointer;padding:4px 16px;border-radius:8px;transition:color 0.15s;}
  .bottom-nav button .nav-icon{font-size:22px;line-height:1;}
  .bottom-nav button.active{color:var(--ink);}

  main{max-width:1100px;margin:0 auto;padding:24px 16px;}
  .page{display:none;}.page.active{display:block;}

  .loading-overlay{position:fixed;inset:0;background:rgba(250,249,246,0.9);display:flex;align-items:center;justify-content:center;z-index:500;}
  .loading-overlay.hidden{display:none;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
  .card-title{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:18px;}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);}
  .stat-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}
  .stat-value{font-family:'DM Serif Display',serif;font-size:24px;line-height:1;margin-bottom:4px;}
  .stat-value.pos{color:var(--green);}.stat-value.neg{color:var(--red);}
  .stat-sub{font-size:11px;color:var(--ink-faint);}

  .dashboard-sections{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}

  /* Monthly table */
  .monthly-table{width:100%;border-collapse:collapse;}
  .monthly-table th{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);text-align:left;padding:8px 8px;border-bottom:1px solid var(--border);}
  .monthly-table td{padding:10px 8px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .monthly-table tr:last-child td{border-bottom:none;}
  .monthly-table tr:hover td{background:var(--cream);}

  .sport-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .sport-row:last-child{border-bottom:none;}
  .sport-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 9px;border-radius:20px;}
  .sport-tag.tennis{background:var(--tennis-light);color:var(--tennis);}
  .sport-tag.football{background:var(--football-light);color:var(--football);}
  .sport-tag.all{background:var(--cream);color:var(--ink-soft);}
  .tipster-tag{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:#f0f0f0;color:#444;white-space:nowrap;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-soft);}
  input,select{font-family:'DM Sans',sans-serif;font-size:16px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);color:var(--ink);outline:none;transition:border-color 0.15s;appearance:none;-webkit-appearance:none;width:100%;}
  input:focus,select:focus{border-color:var(--ink);}

  .resultado-group{display:flex;gap:8px;}
  .resultado-btn{flex:1;padding:13px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;color:var(--ink-soft);text-align:center;}
  .resultado-btn:active{transform:scale(0.97);}
  .resultado-btn.ganada.selected{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:700;}
  .resultado-btn.perdida.selected{background:var(--red-light);border-color:var(--red);color:var(--red);font-weight:700;}
  .resultado-btn.nula.selected{background:var(--nula-light);border-color:var(--nula);color:var(--nula);font-weight:700;}

  .btn-primary{background:var(--ink);color:white;border:none;padding:15px 28px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;width:100%;margin-top:10px;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}

  .bank-form{display:flex;gap:10px;align-items:flex-end;margin-bottom:20px;}
  .bank-form .form-group{flex:1;margin:0;}
  .bank-form button{padding:12px 18px;background:var(--ink);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}

  .add-tipster-row{display:flex;gap:8px;margin-top:10px;}
  .add-tipster-row input{flex:1;}
  .add-tipster-row button{padding:12px 16px;background:var(--ink);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}

  .filters{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
  .filter-btn{padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-soft);cursor:pointer;transition:all 0.15s;}
  .filter-btn.active{background:var(--ink);border-color:var(--ink);color:white;}
  .filter-btn.tennis.active{background:var(--tennis);border-color:var(--tennis);color:white;}
  .filter-btn.football.active{background:var(--football);border-color:var(--football);color:white;}
  .filter-btn.nula-filter.active{background:var(--nula);border-color:var(--nula);color:white;}

  .apuesta-row{display:grid;grid-template-columns:68px 1fr 56px 68px 76px 80px 32px;align-items:center;gap:8px;padding:13px 12px;border-bottom:1px solid var(--border);transition:background 0.1s;font-size:13px;}
  .apuesta-row:last-child{border-bottom:none;}
  .apuesta-row:hover{background:var(--cream);}
  .apuesta-header{display:grid;grid-template-columns:68px 1fr 56px 68px 76px 80px 32px;gap:8px;padding:9px 12px;border-bottom:2px solid var(--border);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);}

  .badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.03em;white-space:nowrap;}
  .badge.ganada{background:var(--green-light);color:var(--green);}
  .badge.perdida{background:var(--red-light);color:var(--red);}
  .badge.nula{background:var(--nula-light);color:var(--nula);}

  .del-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;transition:all 0.15s;line-height:1;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .btn-secondary{background:none;border:1.5px solid var(--border);color:var(--ink-soft);padding:12px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;flex:1;}
  .btn-save{background:var(--ink);color:white;border:none;padding:12px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;flex:1;}

  .empty-state{text-align:center;padding:48px 24px;color:var(--ink-faint);}
  .empty-state p{font-size:15px;margin-top:8px;}

  .toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:white;padding:11px 20px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .racha-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:600;}
  .racha-pill.win{background:var(--green-light);color:var(--green);}
  .racha-pill.loss{background:var(--red-light);color:var(--red);}
  .racha-pill.none{background:var(--cream);color:var(--ink-faint);}

  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .divider{height:1px;background:var(--border);margin:18px 0;}

  /* ── Tipster card ── */
  .tipster-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
  .tipster-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .tipster-name{font-family:'DM Serif Display',serif;font-size:16px;}
  .tipster-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .tkpi{text-align:center;padding:10px 6px;background:var(--cream);border-radius:10px;}
  .tkpi-val{font-family:'DM Serif Display',serif;font-size:18px;line-height:1;}
  .tkpi-lbl{font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px;}

  /* Dot chart */
  .dot-chart{display:flex;flex-wrap:wrap;gap:5px;padding:12px;background:var(--cream);border-radius:10px;margin-bottom:14px;}
  .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:default;}
  .dot.win{background:var(--green);}
  .dot.loss{background:var(--red);}
  .dot.void{background:#ccc;}

  /* Patrones */
  .patrones-list{display:flex;flex-direction:column;gap:8px;}
  .patron-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--cream);border-radius:10px;gap:12px;}
  .patron-seq{display:flex;align-items:center;gap:4px;font-size:13px;}
  .patron-pct{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;}
  .patron-n{font-size:11px;color:var(--ink-faint);white-space:nowrap;}

  /* Tipster stats simple table */
  .tipster-stats-row{display:grid;grid-template-columns:1fr 50px 60px 80px 70px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .tipster-stats-row:last-child{border-bottom:none;}
  .tipster-stats-header{display:grid;grid-template-columns:1fr 50px 60px 80px 70px;gap:8px;padding:6px 0 8px;border-bottom:2px solid var(--border);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);}

  @media(max-width:680px){
    .desktop-nav{display:none;}
    .bottom-nav{display:flex;}
    .dashboard-sections{grid-template-columns:1fr;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .apuesta-row,.apuesta-header{grid-template-columns:60px 1fr 56px 68px 32px;}
    .apuesta-row>*:nth-child(4),.apuesta-row>*:nth-child(6),
    .apuesta-header>*:nth-child(4),.apuesta-header>*:nth-child(6){display:none;}
    .monthly-table th:nth-child(n+5),.monthly-table td:nth-child(n+5){display:none;}
    .tipster-kpis{grid-template-columns:repeat(2,1fr);}
    .tipster-stats-row,.tipster-stats-header{grid-template-columns:1fr 50px 60px 70px;}
    .tipster-stats-row>*:nth-child(4),.tipster-stats-header>*:nth-child(4){display:none;}
    header{padding:0 14px;}
    main{padding:16px 12px;}
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<!-- Modal edición -->
<div class="modal-overlay hidden" id="modal-edit">
  <div class="modal">
    <div class="modal-title">Editar apuesta</div>
    <div class="form-grid">
      <div class="form-group"><label>Cuota</label><input type="number" id="e-cuota" step="0.01" min="1.01" inputmode="decimal"></div>
      <div class="form-group"><label>Cantidad (€)</label><input type="number" id="e-cantidad" step="0.01" min="0.01" inputmode="decimal"></div>
      <div class="form-group"><label>Deporte</label>
        <select id="e-deporte"><option value="tenis">🎾 Tenis</option><option value="futbol">⚽ Fútbol</option></select></div>
      <div class="form-group"><label>Fecha</label><input type="date" id="e-fecha"></div>
      <div class="form-group"><label>Resultado</label>
        <select id="e-resultado"><option value="ganada">✅ Ganada</option><option value="perdida">❌ Perdida</option><option value="nula">↩️ Nula</option></select></div>
      <div class="form-group"><label>Tipster</label><select id="e-tipster"></select></div>
      <div class="form-group full"><label>Descripción</label><input type="text" id="e-desc" placeholder="Ej: Djokovic vs Alcaraz"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">Bet<span>Tracker</span></div>
  <nav class="desktop-nav">
    <button class="active" onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('nueva')">Nueva apuesta</button>
    <button onclick="showPage('historial')">Historial</button>
    <button onclick="showPage('tipsters')">Tipsters</button>
  </nav>
  <div class="header-right">
    <div class="sync-dot" id="sync-dot"></div>
    <div class="bank-badge">Bank: <span id="header-bank">0,00 €</span></div>
  </div>
</header>

<nav class="bottom-nav">
  <button class="active" onclick="showPage('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
  <button onclick="showPage('nueva')"><span class="nav-icon">➕</span>Apuesta</button>
  <button onclick="showPage('historial')"><span class="nav-icon">📋</span>Historial</button>
  <button onclick="showPage('tipsters')"><span class="nav-icon">👤</span>Tipsters</button>
</nav>

<main>

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="card" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:14px">Bank</div>
      <div class="bank-form">
        <div class="form-group"><label>Bank inicial (€)</label><input type="number" id="bank-input" placeholder="Ej: 1000" min="0" step="0.01" inputmode="decimal"></div>
        <button onclick="setBank()">Guardar</button>
      </div>
    </div>
    <div class="stats-grid" id="kpi-grid"></div>
    <div class="dashboard-sections">
      <div class="card"><div class="card-title">Por deporte</div><div id="sport-breakdown"></div></div>
      <div class="card"><div class="card-title">Racha & acierto</div><div id="racha-section"></div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Por mes</div>
      <div style="overflow-x:auto">
        <table class="monthly-table">
          <thead><tr><th>Mes</th><th>Bank inicio</th><th>Bank fin</th><th>Ap.</th><th>Acierto</th><th>Balance</th><th>ROI</th></tr></thead>
          <tbody id="monthly-body"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Resumen tipsters</div>
      <div id="tipster-summary"></div>
    </div>
  </div>

  <!-- NUEVA APUESTA -->
  <div class="page" id="page-nueva">
    <div class="card" style="max-width:520px;margin:0 auto">
      <div class="card-title">Registrar apuesta</div>
      <div class="form-grid">
        <div class="form-group"><label>Cuota</label><input type="number" id="f-cuota" placeholder="Ej: 1.75" step="0.01" min="1.01" inputmode="decimal"></div>
        <div class="form-group"><label>Cantidad (€)</label><input type="number" id="f-cantidad" placeholder="Ej: 50" step="0.01" min="0.01" inputmode="decimal"></div>
        <div class="form-group"><label>Deporte</label>
          <select id="f-deporte"><option value="tenis">🎾 Tenis</option><option value="futbol">⚽ Fútbol</option></select></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="f-fecha"></div>
        <div class="form-group"><label>Tipster</label><select id="f-tipster"></select></div>
        <div class="form-group full"><label>Resultado</label>
          <div class="resultado-group">
            <button class="resultado-btn ganada" onclick="selectResultado('ganada')">✅ Ganada</button>
            <button class="resultado-btn perdida" onclick="selectResultado('perdida')">❌ Perdida</button>
            <button class="resultado-btn nula" onclick="selectResultado('nula')">↩️ Nula</button>
          </div>
        </div>
        <div class="form-group full"><label>Descripción (opcional)</label><input type="text" id="f-desc" placeholder="Ej: Djokovic vs Alcaraz"></div>
        <div class="form-group full">
          <label>Añadir nuevo tipster</label>
          <div class="add-tipster-row">
            <input type="text" id="f-new-tipster" placeholder="Nombre del tipster">
            <button onclick="addTipster()">+ Añadir</button>
          </div>
        </div>
      </div>
      <button class="btn-primary" id="btn-registrar" onclick="registrarApuesta()">Registrar apuesta</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="page" id="page-historial">
    <div class="card">
      <div class="section-header">
        <div class="card-title" style="margin:0">Historial</div>
        <span id="historial-count" style="font-size:12px;color:var(--ink-faint)"></span>
      </div>
      <div class="filters" id="filters-resultado">
        <button class="filter-btn active" onclick="setFilter('resultado','all',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('resultado','ganada',this)">✅ Ganadas</button>
        <button class="filter-btn" onclick="setFilter('resultado','perdida',this)">❌ Perdidas</button>
        <button class="filter-btn nula-filter" onclick="setFilter('resultado','nula',this)">↩️ Nulas</button>
      </div>
      <div class="filters" id="filters-deporte">
        <button class="filter-btn active" onclick="setFilter('deporte','all',this)">🏷 Todos</button>
        <button class="filter-btn tennis" onclick="setFilter('deporte','tenis',this)">🎾 Tenis</button>
        <button class="filter-btn football" onclick="setFilter('deporte','futbol',this)">⚽ Fútbol</button>
      </div>
      <div class="filters" id="filters-tipster"></div>
      <div class="apuesta-header">

// ─── Stats ────────────────────────────────────────────────────────────────────
function calcStats(apuestas){
  const sinNulas=apuestas.filter(a=>a.resultado!=='nula');
  const total=sinNulas.length;
  const nulas=apuestas.filter(a=>a.resultado==='nula').length;
  const ganadas=sinNulas.filter(a=>a.resultado==='ganada').length;
  const totalApostado=sinNulas.reduce((s,a)=>s+a.cantidad,0);
  const beneficioNeto=apuestas.reduce((s,a)=>s+a.beneficio,0);
  const pctAcierto=total>0?(ganadas/total*100):0;
  const roi=totalApostado>0?(beneficioNeto/totalApostado*100):0;
  let racha=0,rachaTipo=null;
  if(sinNulas.length>0){
    rachaTipo=sinNulas[sinNulas.length-1].resultado;
    for(let i=sinNulas.length-1;i>=0;i--){if(sinNulas[i].resultado===rachaTipo)racha++;else break;}
  }
  return{total,ganadas,nulas,totalApostado,beneficioNeto,pctAcierto,roi,racha,rachaTipo};
}

// ─── Análisis de patrones ─────────────────────────────────────────────────────
function analizarPatrones(apuestas){
  // Solo ganadas/perdidas para análisis
  const seq=apuestas.filter(a=>a.resultado!=='nula').map(a=>a.resultado==='ganada'?'W':'L');
  if(seq.length<4)return[];

  // Analizar: dado contexto de N anteriores, ¿qué viene después?
  const patrones={};
  for(let len=1;len<=3;len++){
    for(let i=len;i<seq.length;i++){
      const ctx=seq.slice(i-len,i).join('');
      const next=seq[i];
      if(!patrones[ctx])patrones[ctx]={W:0,L:0,total:0};
      patrones[ctx][next]++;
      patrones[ctx].total++;
    }
  }

  // Generar frases con probabilidades
  const results=[];
  for(const[ctx,counts]of Object.entries(patrones)){
    if(counts.total<3)continue;
    const pW=counts.W/counts.total;
    const pL=counts.L/counts.total;
    const dominant=pW>pL?'W':'L';
    const pct=Math.max(pW,pL)*100;
    if(pct<60)continue; // solo patrones con >60% de consistencia
    results.push({ctx,dominant,pct,n:counts.total,pW:pW*100,pL:pL*100});
  }

  // Ordenar por significancia (pct * log(n))
  results.sort((a,b)=>(b.pct*Math.log(b.n+1))-(a.pct*Math.log(a.n+1)));
  return results.slice(0,5);
}

function seqToEmojis(seq){
  return seq.split('').map(c=>c==='W'
    ?`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--green);vertical-align:middle"></span>`
    :`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--red);vertical-align:middle"></span>`
  ).join(' ');
}

function calcTropiezos(apuestas){
  const seq=apuestas.filter(a=>a.resultado!=='nula').map(a=>a.resultado);
  let cambios=0;
  for(let i=1;i<seq.length;i++)if(seq[i]!==seq[i-1])cambios++;
  return cambios;
}

function rachaMaxima(apuestas,tipo){
  const seq=apuestas.filter(a=>a.resultado!=='nula').map(a=>a.resultado);
  let max=0,cur=0;
  for(const r of seq){if(r===tipo)cur++;else cur=0;if(cur>max)max=cur;}
  return max;
}

function renderTipsterPage(){
  const ap=state.apuestas;
  const allTips=['Sin tipster',...state.tipsters];
  const tipsConAp=allTips.filter(t=>ap.some(a=>a.tipster===t));

  if(tipsConAp.length===0){
    document.getElementById('tipsters-cards').innerHTML=`<div class="empty-state"><div style="font-size:32px">👤</div><p>Aún no hay apuestas con tipster asignado</p></div>`;
    return;
  }

  document.getElementById('tipsters-cards').innerHTML=tipsConAp.map(tipster=>{
    const apT=ap.filter(a=>a.tipster===tipster);
    const st=calcStats(apT);
    const tropiezos=calcTropiezos(apT);
    const rachaMaxW=rachaMaxima(apT,'ganada');
    const rachaMaxL=rachaMaxima(apT,'perdida');
    const patrones=analizarPatrones(apT);

    // Dot chart
    const sinNulas=apT.filter(a=>a.resultado!=='nula');
    const dots=sinNulas.map(a=>`<div class="dot ${a.resultado==='ganada'?'win':'loss'}" title="${a.fecha} · ${a.resultado}"></div>`).join('');

    // Patrones HTML
    let patronesHtml='';
    if(patrones.length===0){
      patronesHtml=`<p style="font-size:12px;color:var(--ink-faint);padding:8px 0">Necesitas más apuestas para detectar patrones.</p>`;
    }else{
      patronesHtml=`<div class="patrones-list">`+patrones.map(p=>{
        const ctxEmojis=seqToEmojis(p.ctx);
        const nextEmoji=p.dominant==='W'
          ?`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--green);vertical-align:middle"></span>`
          :`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--red);vertical-align:middle"></span>`;
        const arrow=`<span style="color:var(--ink-faint);font-size:14px;margin:0 4px">→</span>`;
        return`<div class="patron-row">
          <div class="patron-seq">${ctxEmojis}${arrow}${nextEmoji}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="patron-pct">${p.pct.toFixed(0)}%</span>
            <span class="patron-n">${p.n} veces</span>
          </div>
        </div>`;
      }).join('')+`</div>`;
    }

    const bCls=st.beneficioNeto>=0?'var(--green)':'var(--red)';
    const rCls=st.roi>=0?'var(--green)':'var(--red)';

    return`<div class="tipster-card">
      <div class="tipster-card-header">
        <span class="tipster-name">${tipster}</span>
        <span style="font-size:12px;color:var(--ink-faint)">${st.total+st.nulas} apuestas</span>
      </div>
      <div class="tipster-kpis">
        <div class="tkpi"><div class="tkpi-val" style="color:${bCls}">${st.pctAcierto.toFixed(0)}%</div><div class="tkpi-lbl">Acierto</div></div>
        <div class="tkpi"><div class="tkpi-val">${tropiezos}</div><div class="tkpi-lbl">Tropiezos</div></div>
        <div class="tkpi"><div class="tkpi-val" style="color:var(--green)">${rachaMaxW}</div><div class="tkpi-lbl">Racha max 🟢</div></div>
        <div class="tkpi"><div class="tkpi-val" style="color:var(--red)">${rachaMaxL}</div><div class="tkpi-lbl">Racha max 🔴</div></div>
      </div>
      <div class="tipster-kpis" style="margin-bottom:14px">
        <div class="tkpi"><div class="tkpi-val" style="color:${bCls}">${fmtEur(st.beneficioNeto)}</div><div class="tkpi-lbl">Balance</div></div>
        <div class="tkpi"><div class="tkpi-val" style="color:${rCls}">${fmtPct(st.roi)}</div><div class="tkpi-lbl">ROI</div></div>
        <div class="tkpi"><div class="tkpi-val">${fmtBank(st.totalApostado)}</div><div class="tkpi-lbl">Apostado</div></div>
        <div class="tkpi"><div class="tkpi-val">${st.nulas}</div><div class="tkpi-lbl">Nulas</div></div>
      </div>
      ${sinNulas.length>0?`
      <div style="margin-bottom:6px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint)">Resultados cronológicos</div>
      <div class="dot-chart">${dots}</div>`:''}
      <div style="margin-bottom:8px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint)">5 patrones más frecuentes</div>
      ${patronesHtml}
    </div>`;
  }).join('');
}

// ─── Historial ────────────────────────────────────────────────────────────────
function setFilter(type,val,btn){
  filtros[type]=val;
  const cid=type==='resultado'?'filters-resultado':type==='deporte'?'filters-deporte':'filters-tipster';
  document.querySelectorAll(`#${cid} .filter-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistorial();
}

function renderHistorial(){
  let ap=[...state.apuestas].reverse();
  if(filtros.resultado!=='all')ap=ap.filter(a=>a.resultado===filtros.resultado);
  if(filtros.deporte!=='all')ap=ap.filter(a=>a.deporte===filtros.deporte);
  if(filtros.tipster!=='all')ap=ap.filter(a=>(a.tipster||'Sin tipster')===filtros.tipster);

  document.getElementById('historial-count').textContent=`${ap.length} apuesta${ap.length!==1?'s':''}`;

  if(ap.length===0){
    document.getElementById('historial-list').innerHTML=`<div class="empty-state"><div style="font-size:32px">📭</div><p>No hay apuestas con este filtro</p></div>`;
    return;
  }

  const dIcon={tenis:'🎾',futbol:'⚽'};const dCls={tenis:'tennis',futbol:'football'};
  document.getElementById('historial-list').innerHTML=ap.map(a=>{
    const esNula=a.resultado==='nula';
    const balStyle=esNula?'color:var(--nula);font-weight:500':a.beneficio>=0?'color:var(--green);font-weight:600':'color:var(--red);font-weight:600';
    const balText=esNula?'±0,00 €':fmtEur(a.beneficio);
    const[y,m,d]=a.fecha.split('-');
    const tipsterLabel=a.tipster&&a.tipster!=='Sin tipster'?`<span class="tipster-tag" style="font-size:10px;margin-top:2px">${a.tipster}</span>`:'';
    return`<div class="apuesta-row">
      <span style="color:var(--ink-soft);font-size:12px">${d}/${m}/${y.slice(2)}</span>
      <span style="display:flex;flex-direction:column;gap:2px">
        <span style="display:flex;align-items:center;gap:4px"><span class="sport-tag ${dCls[a.deporte]}" style="font-size:10px">${dIcon[a.deporte]}</span><span style="color:var(--ink-soft);font-size:12px">${a.desc||'—'}</span></span>
        ${tipsterLabel}
      </span>
      <span style="font-weight:600">${a.cuota.toFixed(2)}</span>
      <span>${fmtBank(a.cantidad)}</span>
      <span><span class="badge ${a.resultado}">${a.resultado}</span></span>
      <span style="${balStyle}">${balText}</span>
      <button class="del-btn" onclick="openEdit(${a.id})" title="Editar">✏️</button>
    </div>`;
  }).join('');
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

(async()=>{
  await loadFromSupabase();
  document.getElementById('loading').classList.add('hidden');
  initForm();renderDashboard();
})();
</script>
